name: Build HOW COME? WebView APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle 8.7 (reliable, no wrapper needed) ─────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # ── 4. App icon ─────────────────────────────────────────────
      - name: Download & resize app icon
        run: |
          curl -fsSL -o /tmp/icon.png "https://how-come.vercel.app/icon-192.png"
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "android/app/src/main/res/$dir"
          done
          # ImageMagick 7 uses 'magick', older uses 'convert'
          IM="magick"
          which magick 2>/dev/null || IM="convert"
          $IM /tmp/icon.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          $IM /tmp/icon.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          $IM /tmp/icon.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          $IM /tmp/icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          $IM /tmp/icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          echo "Icons created:"
          find android/app/src/main/res -name "ic_launcher.png"

      # ── 5. SDK path ─────────────────────────────────────────────
      - name: Configure Android SDK
        run: |
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "SDK location: $SDK"
          echo "sdk.dir=$SDK" > android/local.properties
          echo "Available platforms:" && ls "$SDK/platforms/" 2>/dev/null || true
          echo "Available build-tools:" && ls "$SDK/build-tools/" 2>/dev/null || true

      # ── 6. Build unsigned release APK ────────────────────────────
      - name: Build release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon --stacktrace

      # ── 7. Sign APK ──────────────────────────────────────────────
      - name: Sign APK
        run: |
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          BUILD_TOOLS=$(ls "$SDK/build-tools/" | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"

          keytool -genkeypair \
            -alias my-key-alias \
            -keypass howcome2024 \
            -keystore release.keystore \
            -storepass howcome2024 \
            -dname "CN=HOW COME, O=HOW COME PSC, C=IN" \
            -keyalg RSA -keysize 2048 -validity 10000 -noprompt

          "$SDK/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks release.keystore \
            --ks-alias my-key-alias \
            --ks-pass pass:howcome2024 \
            --key-pass pass:howcome2024 \
            --out howcome-webview.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

          echo "APK size: $(du -sh howcome-webview.apk)"

      # ── 8. Upload artifact ───────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HOW-COME-WebView-v2
          path: howcome-webview.apk
          retention-days: 30
