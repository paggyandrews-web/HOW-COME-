name: Build HOW COME? WebView APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build, Sign and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Create app icons
        run: python3 android/scripts/make_icons.py

      - name: Configure Android SDK
        run: |
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "sdk.dir=$SDK" > android/local.properties

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build signed release APK
        working-directory: android
        env:
          RELEASE_KEYSTORE_PATH: release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Build signed release AAB (for future Play Store use)
        working-directory: android
        env:
          RELEASE_KEYSTORE_PATH: release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle bundleRelease --no-daemon --stacktrace

      - name: Rename outputs
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/HOW-COME.apk
          cp android/app/build/outputs/bundle/release/app-release.aab dist/HOW-COME.aab
          ls -lh dist

      - name: Read version name
        id: ver
        run: |
          VERSION=$(grep versionName android/app/build.gradle | head -1 | sed -E 's/.*"(.*)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload APK/AAB as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HOW-COME-Android-v${{ steps.ver.outputs.version }}
          path: dist/*
          retention-days: 90

      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.ver.outputs.version }}-${{ github.run_number }}
          name: HOW COME Android v${{ steps.ver.outputs.version }}
          body: |
            Signed Android build of HOW COME?

            **To install:** download `HOW-COME.apk` below on an Android phone, open it, and allow "install from this source" if prompted. The .aab file is for Play Store submission only — do not share that one.
          files: |
            dist/HOW-COME.apk
            dist/HOW-COME.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
