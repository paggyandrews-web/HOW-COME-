name: Build HOW COME? WebView APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. App icon — download from live PWA & resize ──────────
      - name: Download & resize app icon
        run: |
          sudo apt-get install -y imagemagick -q
          curl -fsSL -o /tmp/icon.png "https://how-come.vercel.app/icon-192.png"
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p android/app/src/main/res/$dir
          done
          convert /tmp/icon.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert /tmp/icon.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/icon.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      # ── 4. Gradle wrapper ──────────────────────────────────────
      - name: Set up Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.4

      # ── 5. Point Gradle at preinstalled Android SDK ────────────
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # ── 6. Build unsigned release APK ──────────────────────────
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # ── 7. Generate signing keystore ───────────────────────────
      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -alias my-key-alias \
            -keypass howcome2024 \
            -keystore release.keystore \
            -storepass howcome2024 \
            -dname "CN=HOW COME, O=HOW COME PSC, C=IN" \
            -keyalg RSA -keysize 2048 -validity 10000

      # ── 8. Sign APK ────────────────────────────────────────────
      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_SDK_ROOT/build-tools/" | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"
          "$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks release.keystore \
            --ks-alias my-key-alias \
            --ks-pass pass:howcome2024 \
            --key-pass pass:howcome2024 \
            --out howcome-webview.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      # ── 9. Verify ──────────────────────────────────────────────
      - name: Verify APK
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_SDK_ROOT/build-tools/" | sort -V | tail -1)
          "$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner" verify --verbose howcome-webview.apk

      # ── 10. Upload artifact (downloadable for 30 days) ─────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HOW-COME-WebView-v2
          path: howcome-webview.apk
          retention-days: 30
